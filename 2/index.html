<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图书网站</title>
   
    <link rel="stylesheet" href="css/index.css">
</head>
<body>
    
    <header class="header">
        <div class="logo">图书商城</div>
        <nav class="nav">
            <ul>
                <li><a href="#">首页</a></li>
                <li><a href="#">分类</a></li>
                <li><a href="#">热销</a></li>
                <li><a href="#">新书</a></li>
            </ul>
        </nav>
    </header>

   
    <div class="container">
        
        <aside class="left-sidebar">
            <h3>图书分类</h3>
            <ul>
                <li>文学小说</li>
                <li>计算机</li>
                <li>历史人文</li>
                <li>经管励志</li>
            </ul>
        </aside>

        <main class="main-content">
            
            <div class="book-show">
                <div class="book-item">
                    <img src="img/book1.jpg" alt="图书封面">
                  
                    <div class="mask">点击查看详情</div>
                </div>
            </div>

            <h3>热门推荐</h3>
            <div class="hot-list">
                <div class="hot-item">《活着》</div>
                <div class="hot-item">《三体》</div>
                <div class="hot-item">《平凡的世界》</div>
            </div>

          
            <h3>新书上市</h3>
            <table class="new-book">
                <tr>
                    <th>书名</th>
                    <th>作者</th>
                    <th>价格</th>
                </tr>
                <tr>
                    <td>《Python入门》</td>
                    <td>张三</td>
                    <td>¥39</td>
                </tr>
                <tr>
                    <td>《Web前端开发》</td>
                    <td>李四</td>
                    <td>¥49</td>
                </tr>
            </table>
        </main>

       
        <aside class="right-sidebar">
            <h3>限时促销</h3>
            <p>全场满100减20</p>
            <p>会员专享8折</p>
        </aside>
    </div>
</body>
</html>
