<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>图书网站-实验4</title>
    <link rel="stylesheet" href="css/lab4-2503-115-index.css">
</head>
<body>
    
    <div class="login-modal" id="loginModal">
        <div class="modal-box">
            <div class="login-form" id="loginForm">
                <h3>登录</h3>
                <input type="text" id="loginUsername" placeholder="请输入用户名">
                <input type="password" id="loginPwd" placeholder="请输入密码">
                <button class="login-btn" onclick="login()">登录</button>
                <p>没有账号？<a href="javascript:;" onclick="showRegister()">去注册</a></p>
            </div>
            <div class="register-form" id="registerForm" style="display: none;">
                <h3>注册</h3>
                <input type="text" id="regUsername" placeholder="请输入用户名">
                <input type="password" id="regPwd" placeholder="请输入密码">
                <button onclick="register()">注册</button>
                <p>已有账号？<a href="javascript:;" onclick="showLogin()">去登录</a></p>
            </div>
            <span class="close-btn" onclick="closeModal()">×</span>
        </div>
    </div>

    
    <header class="header">
        <div class="logo">图书商城</div>
        <nav class="nav">
            <ul>
                <li><a href="#">首页</a></li>
                <li><a href="#">分类</a></li>
                <li><a href="#">热销</a></li>
                <li><a href="#">新书</a></li>
                <li class="icon-item">
                    <span class="icon cart-icon">🛒</span>
                </li>
                <li class="icon-item">
                    <span class="icon search-icon">🔍</span>
                </li>
                <li><a href="javascript:;" onclick="openModal()">登录/注册</a></li>
            </ul>
        </nav>
    </header>

 
    <div class="banner">
        <div class="banner-wrapper">
            <img src="img/book1.jpg" alt="轮播图1">
            <img src="img/book2.jpg" alt="轮播图2">
            <img src="img/book3.jpg" alt="轮播图3">
        </div>
    </div>


    <div class="container">
        <aside class="left-sidebar">
            <h3>图书分类</h3>
            <ul>
                <li>文学小说</li>
                <li>计算机</li>
                <li>历史人文</li>
                <li>经管励志</li>
            </ul>
        </aside>

        <main class="main-content">
       
            <h3>热门图书</h3>
            <div class="hot-book-list">
                <div class="hot-book-item">
                    <img src="img/book1.jpg" alt="图书1">
                    <p>《活着》</p>
                </div>
                <div class="hot-book-item">
                    <img src="img/book2.jpg" alt="图书2">
                    <p>《三体》</p>
                </div>
                <div class="hot-book-item">
                    <img src="img/book3.jpg" alt="图书3">
                    <p>《平凡的世界》</p>
                </div>
            </div>

          
            <h3>新书上市</h3>
            <table class="new-book">
                <tr>
                    <th>书名</th>
                    <th>作者</th>
                    <th>价格</th>
                </tr>
                <tr>
                    <td>《Python入门》</td>
                    <td>张三</td>
                    <td>¥39</td>
                </tr>
                <tr>
                    <td>《Web前端开发》</td>
                    <td>李四</td>
                    <td>¥49</td>
                </tr>
            </table>
        </main>

        <aside class="right-sidebar">
            <h3>限时促销</h3>
            <p>全场满100减20</p>
            <p>会员专享8折</p>
        </aside>
    </div>

    <script>
      
        function openModal() {
            document.getElementById('loginModal').style.display = 'block';
        }
        function closeModal() {
            document.getElementById('loginModal').style.display = 'none';
        }
        function showLogin() {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('registerForm').style.display = 'none';
        }
        function showRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
        }

     
        function register() {
            let username = document.getElementById('regUsername').value;
            let pwd = document.getElementById('regPwd').value;
            if (!username || !pwd) {
                alert('用户名和密码不能为空！');
                return;
            }
            let users = JSON.parse(localStorage.getItem('users')) || [];
            if (users.find(u => u.username === username)) {
                alert('该用户名已注册！');
                return;
            }
            users.push({username, pwd});
            localStorage.setItem('users', JSON.stringify(users));
            alert('注册成功！请登录');
            showLogin();
        }

    
        function login() {
            let username = document.getElementById('loginUsername').value;
            let pwd = document.getElementById('loginPwd').value;
            if (!username || !pwd) {
                alert('用户名和密码不能为空！');
                return;
            }
            let users = JSON.parse(localStorage.getItem('users')) || [];
            if (users.find(u => u.username === username && u.pwd === pwd)) {
                alert('登录成功！');
                closeModal();
            } else {
                alert('用户名或密码错误！');
            }
        }
    </script>
</body>
</html>
